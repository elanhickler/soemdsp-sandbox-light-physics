<svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <rect x="0" y="0" width="760" height="260" fill="#0b0e10" rx="10" />
  <text x="380" y="26" fill="#f3f1ec" font-size="14" text-anchor="middle" font-weight="bold">Vactrol anatomy (original illustration, not a datasheet reproduction)</text>

  <!-- light-tight heat-shrink tube -->
  <rect x="220" y="90" width="320" height="70" rx="14" fill="#161b1f" stroke="#3a4148" stroke-width="2" />
  <text x="380" y="180" fill="#7f8a91" font-size="11" text-anchor="middle">opaque heat-shrink tube (no external light in, no light out)</text>

  <!-- LED emitter -->
  <circle cx="290" cy="125" r="22" fill="#3a2a12" stroke="#e2a86d" stroke-width="2" />
  <circle cx="290" cy="125" r="9" fill="#ffd28a">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite" />
  </circle>
  <text x="290" y="70" fill="#e2a86d" font-size="12" text-anchor="middle">LED / lamp</text>
  <text x="290" y="205" fill="#7f8a91" font-size="10" text-anchor="middle">drive current in &#8594; light out</text>

  <!-- light rays -->
  <line x1="312" y1="125" x2="450" y2="125" stroke="#ffd28a" stroke-width="1.5" stroke-dasharray="4,4">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.4s" repeatCount="indefinite" />
  </line>

  <!-- LDR (CdS cell) -->
  <path d="M 450 105 L 470 105 L 480 115 L 460 125 L 480 135 L 460 145 L 470 145 L 450 145 Z"
        fill="#1c242a" stroke="#7fc7d9" stroke-width="2" transform="translate(0,0)" />
  <circle cx="465" cy="125" r="22" fill="none" stroke="#7fc7d9" stroke-width="2" />
  <text x="465" y="70" fill="#7fc7d9" font-size="12" text-anchor="middle">LDR (CdS photocell)</text>
  <text x="465" y="205" fill="#7f8a91" font-size="10" text-anchor="middle">resistance drops as light rises</text>

  <!-- leads -->
  <line x1="220" y1="125" x2="268" y2="125" stroke="#f3f1ec" stroke-width="2" />
  <line x1="540" y1="125" x2="592" y2="125" stroke="#f3f1ec" stroke-width="2" />
  <text x="244" y="110" fill="#f3f1ec" font-size="10" text-anchor="middle">pin 1/2</text>
  <text x="566" y="110" fill="#f3f1ec" font-size="10" text-anchor="middle">pin 3/4</text>

  <text x="380" y="235" fill="#a0a7b0" font-size="11" text-anchor="middle">
    No electrical connection between sides &#8212; light is the only coupling. That gap is why the
  </text>
  <text x="380" y="250" fill="#a0a7b0" font-size="11" text-anchor="middle">
    LDR's own slow photoconductive decay (not an RC filter) sets the envelope's release time.
  </text>
</svg>
